name: Update Substack feed

# Runs once a day and after every push to main, pulls Sierra's Substack RSS
# feed, converts it to data/substack-posts.json, and commits the change if
# anything is new. This is what keeps the Writing page's Substack section
# current without Sierra touching anything.

on:
  schedule:
    - cron: "0 13 * * *"   # 8am America/Chicago (13:00 UTC) daily
  workflow_dispatch: {}     # lets Sierra trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and convert Substack RSS
        run: node scripts/fetch-substack.mjs

      - name: Commit updated feed data
        run: |
          git config user.name "substack-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/substack-posts.json
          git diff --cached --quiet || git commit -m "chore: refresh Substack feed data"
          git push
